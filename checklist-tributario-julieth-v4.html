// Obtener fecha precargada del Excel
function getFechaExcel(empId, mes, ob) {
  return (FECHAS[empId] && FECHAS[empId][mes] && FECHAS[empId][mes][ob]) || "";
}

function formatFecha(dateStr) {
  if (!dateStr) return "";
  const [y,m,d] = dateStr.split("-");
  return `${d}/${m}/${y}`;
}

let state = {
  mes: new Date().getMonth()+1,
  checks: {},
  expandidos: {},
  tabs: {},
  empresasColapsadas: {},
  busqueda: "",
  modalPendiente: false,
  nuevoPendiente: "",
  pendientesLibres: [],
};

function loadStorage() {
  try { const d=localStorage.getItem("cal-trib-v4"); if(d){const p=JSON.parse(d);state.checks=p.checks||{};state.pendientesLibres=p.pendientesLibres||[];} } catch(e){}
}
function saveStorage() {
  try { localStorage.setItem("cal-trib-v4",JSON.stringify({checks:state.checks,pendientesLibres:state.pendientesLibres})); } catch(e){}
}

function diasRestantes(fecha) {
  if (!fecha) return null;
  const hoy=new Date(); hoy.setHours(0,0,0,0);
  return Math.ceil((new Date(fecha+"T00:00:00")-hoy)/86400000);
}

function diasBadgeHtml(dias) {
  if (dias===null) return "";
  let cls,txt;
  if(dias<0){cls="dias-badge dias-red";txt=`Vencido ${Math.abs(dias)}d`;}
  else if(dias===0){cls="dias-badge dias-red";txt="¡Hoy!";}
  else if(dias<=3){cls="dias-badge dias-red";txt=`${dias}d`;}
  else if(dias<=8){cls="dias-badge dias-yellow";txt=`${dias}d`;}
  else{cls="dias-badge dias-green";txt=`${dias}d`;}
  return `<span class="${cls}">${txt}</span>`;
}

function getCheck(key, empId, mes, ob) {
  if (!state.checks[key]) {
    const fechaExcel = getFechaExcel(empId, mes, ob);
    return {estado:"pendiente", fecha:fechaExcel, notas:""};
  }
  return state.checks[key];
}

// Generar link de Google Calendar
function googleCalLink(titulo, fecha, empresa) {
  if (!fecha) return "";
  const d = fecha.replace(/-/g,"");
  const title = encodeURIComponent(`📋 ${titulo} · ${empresa}`);
  const details = encodeURIComponent(`Obligación tributaria Colombia\nEmpresa: ${empresa}`);
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${d}/${d}&details=${details}`;
}

function checkItemHtml(empId, mes, ob, isCierre) {
  const key = `${empId}-${mes}-${isCierre?"cierre::"+ob:ob}`;
  const ck = getCheck(key, empId, mes, isCierre?"":ob);
  const dias = diasRestantes(ck.fecha);
  const done = ck.estado==="presentado";
  const urgente = dias!==null&&dias<=3&&!done;
  const color = COLORES[empId];
  const isOpen = state.expandidos[key];
  const safeKey = key.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
  const gcLink = !isCierre ? googleCalLink(ob, ck.fecha, EMPRESAS.find(e=>e.id===empId)?.nombre||"") : "";

  return `
    <div class="check-item${done?" done":""}${urgente?" urgente":""}">
      <div class="check-row" onclick="toggleExpand('${safeKey}')">
        <div class="check-box${done?" checked":""}" style="--c:${color.bg}" onclick="event.stopPropagation();toggleCheck('${safeKey}','${empId}',${mes},'${ob.replace(/'/g,"\\'")}',${isCierre})">
          ${done?'<span style="color:#fff;font-size:12px;font-weight:900;line-height:1">✓</span>':""}
        </div>
        <div style="flex:1;min-width:0">
          <span class="check-label${done?" done":""}">${ob}</span>
          ${ck.fecha?`<div class="fecha-label">📅 ${formatFecha(ck.fecha)}</div>`:""}
        </div>
        <div class="check-meta">${diasBadgeHtml(dias)}<span style="color:#9CA3AF;font-size:12px">${isOpen?"▲":"▼"}</span></div>
      </div>
      ${isOpen?`
      <div class="check-detail">
        <div class="field-group">
          <div class="field"><label>Fecha límite</label>
            <input type="date" value="${ck.fecha||""}" onchange="updateCheck('${safeKey}','fecha',this.value)"/></div>
          <div class="field"><label>Estado</label>
            <select onchange="updateCheck('${safeKey}','estado',this.value)">
              <option value="pendiente"${ck.estado==="pendiente"?" selected":""}>⏳ Pendiente</option>
              <option value="en-proceso"${ck.estado==="en-proceso"?" selected":""}>🔄 En proceso</option>
              <option value="presentado"${ck.estado==="presentado"?" selected":""}>✅ Presentado</option>
            </select></div>
        </div>
        <div class="field" style="margin-top:8px"><label>Notas</label>
          <textarea rows="2" placeholder="Escribe aquí con Apple Pencil o teclado..." onchange="updateCheck('${safeKey}','notas',this.value)">${ck.notas||""}</textarea></div>
        ${gcLink?`<a href="${gcLink}" target="_blank"><button class="cal-btn">📆 Agregar a Google Calendar</button></a>`:""}
      </div>`:""}
    </div>`;
}

function statsEmpresaMes(emp,mes){
  const obs=emp.obs[mes]||[]; const cierre=emp.cierre||[];
  let total=0,done=0,urgentes=0;
  [...obs,...cierre.map(c=>"cierre::"+c)].forEach(ob=>{
    const key=`${emp.id}-${mes}-${ob}`; total++;
    const ck=getCheck(key,emp.id,mes,ob.replace("cierre::",""));
    if(ck.estado==="presentado") done++;
    const d=diasRestantes(ck.fecha);
    if(d!==null&&d<=8&&ck.estado!=="presentado") urgentes++;
  });
  return{total,done,urgentes};
}

function statsGlobalesMes(mes){
  let total=0,done=0,urgentes=0;
  EMPRESAS.forEach(emp=>{const s=statsEmpresaMes(emp,mes);total+=s.total;done+=s.done;urgentes+=s.urgentes;});
  return{total,done,urgentes};
}

function empresaCardHtml(emp){
  const color=COLORES[emp.id]; const obs=emp.obs[state.mes]||[]; const cierre=emp.cierre||[];
  if(obs.length===0&&cierre.length===0) return "";
  const{total,done,urgentes}=statsEmpresaMes(emp,state.mes);
  const collapsed=state.empresasColapsadas[emp.id]; const tab=state.tabs[emp.id]||"tributario";
  const doneTrib=obs.filter(o=>getCheck(`${emp.id}-${state.mes}-${o}`,emp.id,state.mes,o).estado==="presentado").length;
  const doneCierre=cierre.filter(c=>getCheck(`${emp.id}-${state.mes}-cierre::${c}`,emp.id,state.mes,"").estado==="presentado").length;
  const pct=total>0?((done/total)*100):0;
  return `
    <div class="empresa-card">
      <div class="empresa-header" style="background:linear-gradient(135deg,${color.bg} 0%,${color.bg}DD 100%)" onclick="toggleEmpresa('${emp.id}')">
        <div style="flex:1">
          <div class="empresa-nombre">${emp.nombre}</div>
          <div class="empresa-sub">NIT: ${emp.nit} · ${emp.actividad}</div>
          <div class="empresa-badges">
            <span class="badge badge-white">${emp.tipo==="Persona Natural"?"P. Natural":"P. Jurídica"}</span>
            ${!emp.contabilidad?'<span class="badge badge-dark">Sin contabilidad</span>':""}
          </div>
        </div>
        <div class="empresa-right">
          ${urgentes>0?`<span class="badge-urgente">⚠️ ${urgentes}</span>`:""}
          <span class="badge-prog">${done}/${total}</span>
          <span class="chevron">${collapsed?"▼":"▲"}</span>
        </div>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${color.bg}"></div></div>
      ${!collapsed?`
      <div class="empresa-body">
        <div class="tabs">
          <button class="tab-btn" style="background:${tab==="tributario"?color.bg:"#F9FAFB"};color:${tab==="tributario"?"#fff":color.text};border-color:${tab==="tributario"?color.bg:color.light}" onclick="setTab('${emp.id}','tributario')">📋 Tributario (${doneTrib}/${obs.length})</button>
          <button class="tab-btn" style="background:${tab==="cierre"?color.bg:"#F9FAFB"};color:${tab==="cierre"?"#fff":color.text};border-color:${tab==="cierre"?color.bg:color.light}" onclick="setTab('${emp.id}','cierre')">📊 Cierre (${doneCierre}/${cierre.length})</button>
        </div>
        ${tab==="tributario"?(obs.length===0?'<p class="empty-msg">Sin obligaciones este mes ✓</p>':obs.map(ob=>checkItemHtml(emp.id,state.mes,ob,false)).join("")):(cierre.length===0?'<p class="empty-msg">Sin tareas configuradas</p>':cierre.map(c=>checkItemHtml(emp.id,state.mes,c,true)).join(""))}
      </div>`:""}
    </div>`;
}

function render(){
  const sg=statsGlobalesMes(state.mes);
  const empFiltradas=EMPRESAS.filter(e=>e.nombre.toLowerCase().includes(state.busqueda.toLowerCase())||e.nit.includes(state.busqueda));
  const todosVacios=empFiltradas.every(e=>(e.obs[state.mes]||[]).length===0&&e.cierre.length===0);
  const modalHtml=state.modalPendiente?`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-title">📌 Pendientes Adicionales</div>
        ${state.pendientesLibres.map((p,i)=>`
          <div class="pendiente-libre">
            <div class="check-box${p.done?" checked":""}" style="--c:#0F172A;flex-shrink:0" onclick="togglePendienteLibre(${i})">
              ${p.done?'<span style="color:#fff;font-size:12px;font-weight:900">✓</span>':""}
            </div>
            <span style="flex:1;font-size:14px;${p.done?"text-decoration:line-through;color:#9CA3AF":""}">${p.texto}</span>
            <button class="del-btn" onclick="deletePendienteLibre(${i})">×</button>
          </div>`).join("")}
        <input class="modal-input" style="margin-top:14px" placeholder="Agregar pendiente..." value="${state.nuevoPendiente}" oninput="state.nuevoPendiente=this.value" onkeydown="if(event.key==='Enter')addPendienteLibre()"/>
        <button class="modal-btn" onclick="addPendienteLibre()">+ Agregar</button>
        <button class="modal-close" onclick="closeModal()">Cerrar</button>
      </div>
    </div>`:"";

  document.getElementById("app").innerHTML=`
    <div class="header">
      <div class="header-top">
        <div><div class="header-sub">Julieth · Contadora Pública</div><div class="header-title">Calendario Tributario 🇨🇴</div></div>
        <div class="header-prog"><div class="header-prog-label">Progreso ${MESES[state.mes-1]}</div>
          <div class="header-prog-val${sg.urgentes>0?" urgente":""}">${sg.done}/${sg.total}</div></div>
      </div>
      <div class="stats">
        ${[{v:sg.total,l:"Total",c:"#93C5FD"},{v:sg.done,l:"Listos",c:"#86EFAC"},{v:sg.total-sg.done,l:"Pendientes",c:"#FCD34D"},{v:sg.urgentes,l:"Urgentes",c:sg.urgentes>0?"#FCA5A5":"#93C5FD"}]
          .map(s=>`<div class="stat"><div class="stat-v" style="color:${s.c}">${s.v}</div><div class="stat-l">${s.l}</div></div>`).join("")}
      </div>
      <div class="meses">
        ${MESES.map((m,i)=>{const mes=i+1;const activo=mes===state.mes;const hayCosas=EMPRESAS.some(e=>(e.obs[mes]||[]).length>0);
          return`<button class="mes-btn${activo?" activo":""}${!hayCosas?" sin-datos":""}" onclick="setMes(${mes})">${m.slice(0,3)}${activo?'<span class="mes-dot"></span>':""}</button>`;}).join("")}
      </div>
    </div>
    <div class="content">
      <input class="search" placeholder="🔍 Buscar empresa o NIT..." value="${state.busqueda}" oninput="state.busqueda=this.value;render()"/>
      ${todosVacios?`<div class="empty-mes"><div class="empty-mes-icon">🎉</div><div class="empty-mes-txt">Sin obligaciones en ${MESES[state.mes-1]}</div></div>`:empFiltradas.map(e=>empresaCardHtml(e)).join("")}
      <p class="save-note">💾 Datos guardados automáticamente · 2026</p>
    </div>
    <button class="fab" onclick="openModal()">📌</button>
    ${modalHtml}`;
}

function setMes(m){state.mes=m;render();}
function toggleEmpresa(id){state.empresasColapsadas[id]=!state.empresasColapsadas[id];render();}
function setTab(id,tab){state.tabs[id]=tab;render();}
function toggleExpand(key){state.expandidos[key]=!state.expandidos[key];render();}
function toggleCheck(key,empId,mes,ob,isCierre){
  const ck=getCheck(key,empId,mes,ob);
  state.checks[key]={...ck,estado:ck.estado==="presentado"?"pendiente":"presentado"};
  saveStorage();render();
}
function updateCheck(key,field,val){
  const parts=key.split("-"); const empId=parts[0]; const mes=parseInt(parts[1]); const ob=parts.slice(2).join("-");
  state.checks[key]={...getCheck(key,empId,mes,ob),[field]:val};
  saveStorage();render();
}
function openModal(){state.modalPendiente=true;render();}
function closeModal(){state.modalPendiente=false;render();}
function addPendienteLibre(){if(!state.nuevoPendiente.trim())return;state.pendientesLibres.push({texto:state.nuevoPendiente.trim(),done:false});state.nuevoPendiente="";saveStorage();render();}
function togglePendienteLibre(i){state.pendientesLibres[i].done=!state.pendientesLibres[i].done;saveStorage();render();}
function deletePendienteLibre(i){state.pendientesLibres.splice(i,1);saveStorage();render();}

loadStorage();
render();
</script>
</body>
</html>
